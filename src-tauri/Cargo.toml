[package]
name = "screenpebble"
version = "0.1.0"
description = "A local-first low-FPS screen-region utility."
authors = ["o-henry"]
license = "MIT"
repository = "https://github.com/o-henry/pebble"
edition = "2021"
rust-version = "1.77"
default-run = "screenpebble"

[lib]
name = "screenpebble_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.0.0", features = ["macos-private-api"] }
