name: Feature request
description: Suggest a narrow, privacy-preserving improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Pebble is local-first. Requests that add hidden capture, telemetry, cloud sync, browser automation, or always-on AI are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What small user job would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Pebble do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Region selection
        - Capture lifecycle
        - Live tile
        - Local diff
        - Local OCR
        - Optional AI handoff
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy impact
      description: What data would be captured, stored, or handed off?
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This keeps AI requests attached to an explicit visible user action.
          required: true
        - label: This does not require browser cookie scraping or ChatGPT web automation.
          required: true
        - label: This does not persist captured frames or OCR history.
          required: true
